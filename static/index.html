<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>播放统计</title>
  <link rel="stylesheet" href="static/css/style.css">
</head>
<body>
  <div class="page">
    <header class="header">
      <h1 class="header__title">播放统计</h1>
      <p class="header__subtitle">记录你的听歌习惯</p>
    </header>

    <div class="tabs" role="tablist">
      <button class="tabs__btn tabs__btn--active" data-days="0" role="tab">全部</button>
      <button class="tabs__btn" data-days="7" role="tab">近 7 天</button>
      <button class="tabs__btn" data-days="30" role="tab">近 30 天</button>
    </div>

    <section class="cards" id="summaryCards">
      <div class="card">
        <span class="card__label">播放次数</span>
        <span class="card__value" id="totalPlays">—</span>
      </div>
      <div class="card">
        <span class="card__label">听歌时长</span>
        <span class="card__value" id="totalDuration">—</span>
      </div>
      <div class="card">
        <span class="card__label">不同歌曲</span>
        <span class="card__value" id="uniqueSongs">—</span>
      </div>
      <div class="card">
        <span class="card__label">不同艺术家</span>
        <span class="card__value" id="uniqueArtists">—</span>
      </div>
    </section>

    <div class="grid">
      <section class="panel">
        <h2 class="panel__title">艺术家排行</h2>
        <ol class="rank-list" id="topArtists">
          <li class="rank-list__empty">加载中…</li>
        </ol>
      </section>

      <section class="panel">
        <h2 class="panel__title">歌曲排行</h2>
        <ol class="rank-list" id="topSongs">
          <li class="rank-list__empty">加载中…</li>
        </ol>
      </section>
    </div>

    <section class="panel panel--full">
      <div class="panel__header">
        <h2 class="panel__title">最近播放</h2>
        <button class="btn-text" id="clearBtn" type="button">清空记录</button>
      </div>
      <ul class="history-list" id="historyList">
        <li class="history-list__empty">加载中…</li>
      </ul>
    </section>
  </div>

  <script type="module" src="static/js/app.js"></script>
</body>
</html>
