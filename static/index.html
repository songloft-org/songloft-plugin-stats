<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="static/icon.svg">
  <title>播放统计</title>
  <link rel="stylesheet" href="static/css/style.css">
</head>
<body>
  <div class="page">
    <header class="header">
      <h1 class="header__title">
        <img class="header__icon" src="static/icon.svg" alt="" aria-hidden="true">
        播放统计
      </h1>
      <p class="header__subtitle">记录你的听歌习惯</p>
    </header>

    <div class="tabs" role="tablist">
      <button class="tabs__btn tabs__btn--active" data-days="0" role="tab" aria-selected="true">全部</button>
      <button class="tabs__btn" data-days="7" role="tab" aria-selected="false">近 7 天</button>
      <button class="tabs__btn" data-days="30" role="tab" aria-selected="false">近 30 天</button>
    </div>

    <section class="cards" id="summaryCards">
      <div class="card">
        <span class="card__label">播放次数</span>
        <span class="card__value" id="totalPlays">—</span>
      </div>
      <div class="card">
        <span class="card__label">听歌时长</span>
        <span class="card__value" id="totalDuration">—</span>
      </div>
      <div class="card">
        <span class="card__label">不同歌曲</span>
        <span class="card__value" id="uniqueSongs">—</span>
      </div>
      <div class="card">
        <span class="card__label">不同艺术家</span>
        <span class="card__value" id="uniqueArtists">—</span>
      </div>
    </section>

    <div class="grid">
      <section class="panel">
        <h2 class="panel__title">艺术家排行</h2>
        <ol class="rank-list" id="topArtists">
          <li class="rank-list__empty">加载中…</li>
        </ol>
      </section>

      <section class="panel">
        <h2 class="panel__title">歌曲排行</h2>
        <ol class="rank-list" id="topSongs">
          <li class="rank-list__empty">加载中…</li>
        </ol>
      </section>
    </div>

    <section class="panel panel--spaced">
      <h2 class="panel__title">来源分布</h2>
      <ol class="rank-list" id="sourceList">
        <li class="rank-list__empty">加载中…</li>
      </ol>
    </section>

    <section class="panel panel--full">
      <h2 class="panel__title">最近播放</h2>
      <ul class="history-list" id="historyList">
        <li class="history-list__empty">加载中…</li>
      </ul>
    </section>
  </div>

  <!-- 自定义弹窗 -->
  <div class="dialog-overlay" id="dialogOverlay" role="dialog" aria-modal="true" aria-labelledby="dialogTitle">
    <div class="dialog">
      <h3 class="dialog__title" id="dialogTitle"></h3>
      <p class="dialog__body" id="dialogBody"></p>
      <div class="dialog__actions">
        <button class="dialog__btn dialog__btn--cancel" id="dialogCancel" type="button">取消</button>
        <button class="dialog__btn dialog__btn--confirm" id="dialogConfirm" type="button">确定</button>
      </div>
    </div>
  </div>

  <!-- Toast 提示 -->
  <div class="toast" id="toast" role="alert" aria-live="polite"></div>

  <script type="module" src="static/js/app.js"></script>
</body>
</html>
